services:
  - type: web
    name: neondriver
    env: docker
    region: frankfurt
    plan: free
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neondriver-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: REDIS_URL
        value: ""

  - type: postgres
    name: neondriver-db
    region: frankfurt
    plan: free
    databaseName: neondriver
    user: neondriver
    password: neondriver